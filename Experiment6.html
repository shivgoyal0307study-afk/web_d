<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content Changer</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
            transition: background-color 0.4s ease-in-out;
        }
        .container {
            width: 600px;
            margin: 50px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 8px 14px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background-color: #0056b3;
        }
        input {
            padding: 10px;
            width: 280px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        p {
            margin-top: 25px;
            line-height: 1.6;
            font-size: 16px;
            transition: font-size 0.2s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="mainHeading">Welcome to JavaScript Lab</h2>
        <input type="text" id="userInput" placeholder="Enter new heading text"><br><br>
        
        <button id="changeTextBtn">Change Heading</button>
        <button id="bgColorBtn">Change Background</button>
        <button id="fontSizeBtn">Increase Font Size</button>
        <button id="toggleBtn">Show/Hide Paragraph</button>
        <button id="resetBtn">Reset</button>
        
        <p id="paragraph">
            This is a sample paragraph. JavaScript events can dynamically change content structure and style presentation attributes over current active workflow operations[cite: 120].
        </p>
    </div>

    <script>
        let heading = document.getElementById("mainHeading");
        let paragraph = document.getElementById("paragraph");
        let input = document.getElementById("userInput");
        let fontSize = 16;

        // Changing structural text parameters on standard event hooks [cite: 117]
        document.getElementById("changeTextBtn").addEventListener("click", function () {
            if (input.value.trim() !== "") {
                heading.innerHTML = input.value;
            } else {
                alert("Input layer field buffer is empty. Please insert a statement.");
            }
        });

        // Triggering dynamic random hexadecimal runtime background canvas mutations [cite: 117]
        document.getElementById("bgColorBtn").onclick = function () {
            let randomHex = "#" + Math.floor(Math.random() * 16777215).toString(16);
            document.body.style.backgroundColor = randomHex;
        };

        // Increment scaling font alterations on click indicators [cite: 117]
        document.getElementById("fontSizeBtn").addEventListener("click", function () {
            fontSize += 2;
            paragraph.style.fontSize = fontSize + "px";
        });

        // Visibility layout engine configuration matching layer conditions [cite: 118]
        document.getElementById("toggleBtn").addEventListener("click", function () {
            if (paragraph.style.display === "none") {
                paragraph.style.display = "block";
            } else {
                paragraph.style.display = "none";
            }
        });

        // Restoring baseline core layout default state constraints cleanly [cite: 118]
        document.getElementById("resetBtn").addEventListener("click", function () {
            heading.innerHTML = "Welcome to JavaScript Lab";
            paragraph.style.display = "block [cite: 125]";
            paragraph.style.fontSize = "16px [cite: 125]";
            document.body.style.backgroundColor = "#f4f4f4 [cite: 125]";
            input.value = "";
            fontSize = 16;
        });
    </script>
</body>
</html>
